<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>星际命典 - Astral Codex</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Serif+SC:wght@400;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{--cyan:#0ef;--blue:#1a6fff;--purple:#a855f7;--gold:#f0c040;--bg:#020818;--card:#0a1628;--text:#c8d8f0}
html{scroll-behavior:smooth}
body{min-height:100vh;background:var(--bg);color:var(--text);font-family:'Noto Serif SC',serif;overflow-x:hidden}

/* ===== 星空背景 ===== */
#stars{position:fixed;inset:0;z-index:0;pointer-events:none}
body::after{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 30% 20%,rgba(10,60,180,.12),transparent 60%),radial-gradient(ellipse at 70% 80%,rgba(168,85,247,.08),transparent 50%);z-index:0;pointer-events:none}
.wrap{position:relative;z-index:1;max-width:1100px;margin:0 auto;padding:20px}

/* ===== 标题 ===== */
.hdr{text-align:center;padding:40px 20px 10px}
.hdr h1{font-family:'Orbitron',sans-serif;font-size:clamp(1.8rem,4.5vw,3rem);font-weight:900;background:linear-gradient(135deg,var(--cyan),var(--blue),var(--purple),var(--gold));background-size:300% 300%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:hShift 8s ease infinite;letter-spacing:4px}
@keyframes hShift{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
.hdr .sub{font-family:'Orbitron',sans-serif;font-size:.72rem;color:var(--cyan);letter-spacing:8px;opacity:.5;margin-top:6px}
.divider{width:200px;height:1px;margin:18px auto;background:linear-gradient(90deg,transparent,var(--cyan),var(--blue),var(--cyan),transparent)}

/* ===== 导航标签 ===== */
.nav{display:flex;justify-content:center;flex-wrap:wrap;gap:8px;margin-bottom:30px}
.nav button{font-family:'Orbitron',sans-serif;font-size:.72rem;padding:9px 22px;background:rgba(10,22,40,.7);border:1px solid rgba(0,238,255,.15);color:var(--cyan);cursor:pointer;border-radius:3px;transition:all .3s;letter-spacing:2px;backdrop-filter:blur(6px)}
.nav button:hover{border-color:rgba(0,238,255,.4);box-shadow:0 0 18px rgba(0,238,255,.1)}
.nav button.on{background:rgba(0,238,255,.08);border-color:var(--cyan);box-shadow:0 0 20px rgba(0,238,255,.15),inset 0 0 20px rgba(0,238,255,.04)}

/* ===== 面板通用 ===== */
.panel{display:none;animation:fadeIn .5s ease}
.panel.show{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

/* ===== 星座书（翻书效果）===== */
.book-wrap{display:flex;justify-content:center;padding:10px 0;perspective:2200px}
.book{position:relative;transform-style:preserve-3d;transition:width .6s ease}
.book.closed{width:440px;height:640px}
.book.opened{width:920px;height:640px}

/* 封面 - 单页合拢 */
.book-cover{position:absolute;inset:0;background:linear-gradient(145deg,#0d1e38,#08132a 50%,#0a1830);border:1px solid rgba(0,238,255,.15);border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;z-index:70;transition:opacity .5s,transform .5s;overflow:hidden;padding:36px 30px}
.book-cover::before{content:'';position:absolute;inset:8px;border:1px solid rgba(0,238,255,.08);border-radius:7px;pointer-events:none}
.book-cover::after{content:'';position:absolute;inset:16px;border:1px solid rgba(168,85,247,.06);border-radius:5px;pointer-events:none}
.book-cover.hidden{opacity:0;pointer-events:none;transform:scale(.95)}
.cover-title{font-family:'Orbitron',sans-serif;font-size:1.8rem;font-weight:900;background:linear-gradient(135deg,var(--cyan),var(--blue),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:6px;margin-bottom:8px}
.cover-sub{font-family:'Orbitron',sans-serif;font-size:.65rem;color:var(--cyan);letter-spacing:6px;opacity:.45;margin-bottom:24px}
.cover-symbols{font-size:2rem;letter-spacing:8px;margin-bottom:24px;opacity:.35;color:var(--cyan);white-space:nowrap}
.cover-grid-wrap{width:100%;max-width:320px}
.cover-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:8px}
.cover-grid .zitem{text-align:center;padding:8px 2px;border:1px solid rgba(0,238,255,.06);border-radius:4px;cursor:pointer;transition:all .3s;background:rgba(0,238,255,.01)}
.cover-grid .zitem:hover{border-color:rgba(0,238,255,.35);background:rgba(0,238,255,.07);box-shadow:0 0 14px rgba(0,238,255,.1);transform:translateY(-2px)}
.cover-grid .zitem .sym{font-size:1.3rem;display:block}
.cover-grid .zitem .zname{font-size:.6rem;color:var(--cyan);letter-spacing:1px;margin-top:2px;display:block;white-space:nowrap}
.cover-grid .zitem .zdate{font-size:.5rem;color:rgba(200,216,240,.3);margin-top:1px;display:block;white-space:nowrap}
.cover-hint{font-size:.75rem;color:var(--cyan);margin-top:20px;letter-spacing:3px;animation:coverPulse 2.5s ease infinite}
@keyframes coverPulse{0%,100%{opacity:.45}50%{opacity:.85}}

/* 翻页内容区 */
.book-inner{position:absolute;inset:0;display:none;transform-style:preserve-3d}
.book-left{position:absolute;left:0;width:50%;height:100%;background:linear-gradient(225deg,#0c1a30,#0a1424);border:1px solid rgba(0,238,255,.1);border-right:none;border-radius:8px 0 0 8px;padding:34px 30px;overflow:hidden}
.book-spine{position:absolute;left:50%;top:0;width:2px;height:100%;background:linear-gradient(180deg,transparent,var(--cyan),var(--blue),var(--cyan),transparent);opacity:.3;z-index:50}
.page{position:absolute;width:50%;height:100%;right:0;transform-origin:left center;transform-style:preserve-3d;transition:transform 1s cubic-bezier(.645,.045,.355,1);z-index:1;cursor:pointer}
.page.flipped{transform:rotateY(-180deg);z-index:0}
.page-front,.page-back{position:absolute;width:100%;height:100%;backface-visibility:hidden;padding:34px 30px;overflow:hidden}
.page-front{background:linear-gradient(135deg,#0c1a30,#0a1424);border:1px solid rgba(0,238,255,.1);border-left:none;border-radius:0 8px 8px 0}
.page-back{transform:rotateY(180deg);background:linear-gradient(225deg,#0c1a30,#0a1424);border:1px solid rgba(0,238,255,.1);border-right:none;border-radius:8px 0 0 8px}
.page-title{font-family:'Orbitron',sans-serif;font-size:1.05rem;color:var(--cyan);margin-bottom:16px;letter-spacing:2px;border-bottom:1px solid rgba(0,238,255,.1);padding-bottom:10px}
.page-content{font-size:.95rem;line-height:2;color:rgba(200,216,240,.8)}
.page-content b{color:var(--gold);font-size:1rem}
.page-content .tag{display:inline-block;background:rgba(0,238,255,.06);border:1px solid rgba(0,238,255,.15);padding:3px 12px;border-radius:2px;font-size:.78rem;color:var(--cyan);margin:3px 3px;letter-spacing:1px}
.book-nav{display:flex;justify-content:center;gap:16px;margin-top:16px}
.book-nav button{font-family:'Orbitron',sans-serif;font-size:.68rem;padding:8px 22px;background:rgba(10,22,40,.6);border:1px solid rgba(0,238,255,.15);color:var(--cyan);cursor:pointer;border-radius:2px;transition:all .3s;letter-spacing:2px}
.book-nav button:hover{border-color:var(--cyan);box-shadow:0 0 12px rgba(0,238,255,.1)}
.book-nav .pg-info{font-family:'Orbitron',sans-serif;font-size:.68rem;color:rgba(0,238,255,.4);align-self:center;letter-spacing:2px}

/* 元素分类 */
.elem-section{margin:10px 0}
.elem-title{font-family:'Orbitron',sans-serif;font-size:.7rem;letter-spacing:3px;margin-bottom:8px;padding:4px 10px;border-radius:2px;display:inline-block}
.elem-fire{color:#ff6b35;border-bottom:1px solid rgba(255,107,53,.3)}
.elem-earth{color:#8b9a46;border-bottom:1px solid rgba(139,154,70,.3)}
.elem-air{color:#5cc8ff;border-bottom:1px solid rgba(92,200,255,.3)}
.elem-water{color:#7c6cf0;border-bottom:1px solid rgba(124,108,240,.3)}

/* 隐藏滚动条 */
.page-front::-webkit-scrollbar,.page-back::-webkit-scrollbar,.book-left::-webkit-scrollbar{display:none}
.page-front,.page-back,.book-left{scrollbar-width:none;-ms-overflow-style:none}
.zodiac-grid .zitem .zname{font-size:.75rem;color:var(--cyan);letter-spacing:1px}
.zodiac-grid .zitem .zdate{font-size:.62rem;color:rgba(200,216,240,.4);margin-top:2px}

/* 元素分类 */
.elem-section{margin:12px 0}
.elem-title{font-family:'Orbitron',sans-serif;font-size:.7rem;letter-spacing:3px;margin-bottom:8px;padding:4px 10px;border-radius:2px;display:inline-block}
.elem-fire{color:#ff6b35;border-bottom:1px solid rgba(255,107,53,.3)}
.elem-earth{color:#8b9a46;border-bottom:1px solid rgba(139,154,70,.3)}
.elem-air{color:#5cc8ff;border-bottom:1px solid rgba(92,200,255,.3)}
.elem-water{color:#7c6cf0;border-bottom:1px solid rgba(124,108,240,.3)}

/* ===== 运势查询面板 ===== */
.fortune-box{max-width:600px;margin:0 auto}
.input-group{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;justify-content:center}
.input-group input,.input-group select{font-family:'Noto Serif SC',serif;font-size:.88rem;padding:10px 16px;background:rgba(10,22,40,.8);border:1px solid rgba(0,238,255,.15);color:var(--text);border-radius:3px;outline:none;transition:border-color .3s;flex:1;min-width:100px;-moz-appearance:textfield}
.input-group input::-webkit-outer-spin-button,.input-group input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
.input-group input:focus,.input-group select:focus{border-color:var(--cyan);box-shadow:0 0 12px rgba(0,238,255,.1)}
.input-group select option{background:#0a1628}
.btn-main{font-family:'Orbitron',sans-serif;font-size:.78rem;padding:10px 30px;background:linear-gradient(135deg,rgba(0,238,255,.1),rgba(26,111,255,.1));border:1px solid var(--cyan);color:var(--cyan);cursor:pointer;border-radius:3px;letter-spacing:2px;transition:all .3s;min-width:auto;flex:none}
.btn-main:hover{background:linear-gradient(135deg,rgba(0,238,255,.18),rgba(26,111,255,.15));box-shadow:0 0 25px rgba(0,238,255,.15);transform:translateY(-1px)}

/* 运势结果卡 */
.result-card{background:rgba(10,22,40,.7);border:1px solid rgba(0,238,255,.12);border-radius:8px;padding:24px;backdrop-filter:blur(8px);position:relative;overflow:hidden;animation:fadeIn .6s ease}
.result-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--cyan),var(--blue),var(--purple),transparent)}
.result-card .rc-head{display:flex;align-items:center;gap:16px;margin-bottom:18px;padding-bottom:14px;border-bottom:1px solid rgba(0,238,255,.08)}
.result-card .rc-sym{font-size:2.8rem;line-height:1;filter:drop-shadow(0 0 12px rgba(0,238,255,.3))}
.result-card .rc-info h3{font-family:'Orbitron',sans-serif;font-size:1rem;color:var(--cyan);letter-spacing:2px}
.result-card .rc-info p{font-size:.78rem;color:rgba(200,216,240,.5);margin-top:3px}
.meter{display:flex;align-items:center;gap:8px;margin:6px 0}
.meter-label{font-size:.75rem;color:rgba(200,216,240,.6);width:70px;text-align:right;flex-shrink:0}
.meter-bar{flex:1;height:6px;background:rgba(0,238,255,.06);border-radius:3px;overflow:hidden}
.meter-fill{height:100%;border-radius:3px;transition:width 1s ease;background:linear-gradient(90deg,var(--cyan),var(--blue))}
.meter-fill.high{background:linear-gradient(90deg,var(--gold),#f08030)}
.meter-val{font-family:'Orbitron',sans-serif;font-size:.65rem;color:var(--cyan);width:30px}
.fortune-section{margin-top:16px}
.fortune-section h4{font-family:'Orbitron',sans-serif;font-size:.72rem;color:var(--purple);letter-spacing:2px;margin-bottom:8px}
.fortune-section p{font-size:.85rem;line-height:1.9;color:rgba(200,216,240,.75);padding-left:12px;border-left:2px solid rgba(168,85,247,.15)}

/* ===== 配对面板 ===== */
.match-box{max-width:650px;margin:0 auto}
.match-row{display:flex;gap:12px;align-items:end;justify-content:center;flex-wrap:wrap;margin-bottom:24px}
.match-row select{font-family:'Noto Serif SC',serif;font-size:.88rem;padding:10px 16px;background:rgba(10,22,40,.8);border:1px solid rgba(0,238,255,.15);color:var(--text);border-radius:3px;outline:none;transition:border-color .3s;width:160px}
.match-row select:focus{border-color:var(--cyan)}
#matchCombo select{font-family:'Noto Serif SC',serif;font-size:.85rem;padding:9px 14px;background:rgba(10,22,40,.8);border:1px solid rgba(0,238,255,.15);color:var(--text);border-radius:3px;outline:none;transition:border-color .3s;display:block}
#matchCombo select:focus{border-color:var(--cyan)}
#matchCombo select option{background:#0a1628}
.match-row select option{background:#0a1628}
.match-vs{font-family:'Orbitron',sans-serif;font-size:.9rem;color:var(--purple);align-self:center}
.match-result{animation:fadeIn .6s ease}
.match-pair{display:flex;justify-content:center;align-items:center;gap:30px;margin-bottom:20px}
.match-pair .mp-item{text-align:center}
.match-pair .mp-sym{font-size:2.6rem;display:block;filter:drop-shadow(0 0 10px rgba(0,238,255,.25))}
.match-pair .mp-name{font-size:.82rem;color:var(--cyan);margin-top:4px;letter-spacing:1px}
.match-heart{font-size:1.8rem;color:var(--purple);animation:heartBeat 1.5s ease infinite}
@keyframes heartBeat{0%,100%{transform:scale(1)}50%{transform:scale(1.2)}}
.match-score{text-align:center;margin:14px 0}
.match-score .big{font-family:'Orbitron',sans-serif;font-size:2.5rem;font-weight:900;background:linear-gradient(135deg,var(--cyan),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.match-score .lbl{font-size:.72rem;color:rgba(200,216,240,.4);letter-spacing:3px;margin-top:2px}
.match-detail{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:16px}
.match-detail .md-card{background:rgba(0,238,255,.03);border:1px solid rgba(0,238,255,.08);border-radius:4px;padding:14px;transition:border-color .3s}
.match-detail .md-card:hover{border-color:rgba(0,238,255,.2)}
.match-detail .md-card h5{font-family:'Orbitron',sans-serif;font-size:.65rem;color:var(--cyan);letter-spacing:2px;margin-bottom:6px}
.match-detail .md-card p{font-size:.8rem;line-height:1.7;color:rgba(200,216,240,.65)}

/* 属相配对切换 */
.match-tabs{display:flex;justify-content:center;gap:6px;margin-bottom:16px}
.match-tabs button{font-size:.78rem;padding:6px 18px;background:transparent;border:1px solid rgba(168,85,247,.15);color:rgba(168,85,247,.6);cursor:pointer;border-radius:2px;transition:all .3s;font-family:'Noto Serif SC',serif}
.match-tabs button.on{background:rgba(168,85,247,.08);border-color:var(--purple);color:var(--purple)}

/* 隐藏滚动条 */
.page-front::-webkit-scrollbar,.page-back::-webkit-scrollbar,.book-left::-webkit-scrollbar{display:none}
.page-front,.page-back,.book-left{scrollbar-width:none;-ms-overflow-style:none}

/* 手机端卡片模式 */
.mobile-card{display:none}
.mobile-card .mc-page{background:linear-gradient(160deg,#0c1a30,#0a1424);border:1px solid rgba(0,238,255,.1);border-radius:8px;padding:22px 18px;margin-bottom:8px;position:relative;overflow:hidden}
.mobile-card .mc-page::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--cyan),var(--blue),transparent)}
.mc-content{animation:mcFade .4s ease}
@keyframes mcFade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.mc-nav{display:flex;justify-content:center;gap:8px;margin-top:10px;flex-wrap:wrap}
.mc-nav button{font-family:'Orbitron',sans-serif;font-size:.6rem;padding:7px 16px;background:rgba(10,22,40,.6);border:1px solid rgba(0,238,255,.15);color:var(--cyan);cursor:pointer;border-radius:2px;letter-spacing:1px;transition:all .3s}
.mc-nav button:hover,.mc-nav button:active{border-color:var(--cyan);background:rgba(0,238,255,.06)}
.mc-nav .pg-info{font-family:'Orbitron',sans-serif;font-size:.58rem;color:rgba(0,238,255,.4);align-self:center}

@media(max-width:960px){
  .book.closed{width:380px;height:580px}
  .book.opened{width:760px;height:580px}
  .cover-grid{grid-template-columns:repeat(4,1fr)}
}
@media(max-width:780px){
  .book-wrap{display:none!important}
  .book-nav{display:none!important}
  .mobile-card{display:block}
  .m-cover{background:linear-gradient(145deg,#0d1e38,#08132a 50%,#0a1830);border:1px solid rgba(0,238,255,.15);border-radius:10px;padding:24px 16px;text-align:center;position:relative;overflow:hidden}
  .m-cover::before{content:'';position:absolute;inset:5px;border:1px solid rgba(0,238,255,.06);border-radius:7px;pointer-events:none}
  .m-cover .cover-title{font-size:1.3rem;letter-spacing:3px;margin-bottom:4px}
  .m-cover .cover-sub{font-size:.55rem;letter-spacing:4px;margin-bottom:12px}
  .m-cover .cover-symbols{font-size:1rem;letter-spacing:3px;margin-bottom:10px}
  .m-cover .cover-grid{grid-template-columns:repeat(4,1fr);gap:5px}
  .m-cover .cover-grid .zitem{padding:6px 2px}
  .m-cover .cover-grid .zitem .sym{font-size:1rem}
  .m-cover .cover-grid .zitem .zname{font-size:.55rem}
  .m-cover .cover-grid .zitem .zdate{font-size:.45rem}
  .m-cover .cover-hint{font-size:.62rem;margin-top:12px}
  .match-detail{grid-template-columns:1fr}
  .input-group{flex-direction:column;align-items:stretch}
  .match-row{flex-direction:column;align-items:stretch;gap:10px}
  .match-row select{width:100%}
  .match-row .match-vs{display:none}
  .match-row .btn-main{align-self:center;margin-top:4px}
  #matchCombo>div:first-child{gap:10px!important}
  #matchCombo .match-vs{display:none}
  .hdr{padding:20px 10px 6px}
  .hdr h1{font-size:1.5rem}
  .hdr .sub{font-size:.55rem;letter-spacing:5px}
  .divider{margin:10px auto}
  .nav{gap:5px;margin-bottom:16px}
  .nav button{font-size:.6rem;padding:7px 14px;letter-spacing:1px}
}
</style>
</head>
<body>
<canvas id="stars"></canvas>
<div class="wrap">
  <header class="hdr">
    <h1>ASTRAL CODEX</h1>
    <p class="sub">星 际 命 典</p>
  </header>
  <div class="divider"></div>
  <nav class="nav">
    <button class="on" onclick="showPanel('book')">✦ 星座图鉴</button>
    <button onclick="showPanel('fortune')">✦ 运势查询</button>
    <button onclick="showPanel('match')">✦ 配对指数</button>
  </nav>

  <!-- ===== 星座书 ===== -->
  <div class="panel show" id="panelBook">
    <!-- 桌面端：翻书 -->
    <div class="book-wrap">
      <div class="book closed" id="book">
        <div class="book-cover" id="bookCover"></div>
        <div class="book-inner" id="bookInner">
          <div class="book-left" id="bookLeft"></div>
          <div class="book-spine"></div>
        </div>
      </div>
    </div>
    <div class="book-nav" id="bookNav" style="display:none">
      <button onclick="backToCover()">◁ 总览</button>
      <button onclick="bookPrev()">◁ PREV</button>
      <span class="pg-info" id="pgInfo">1 / 12</span>
      <button onclick="bookNext()">NEXT ▷</button>
    </div>
    <!-- 手机端：日历翻页 -->
    <div class="mobile-card" id="mobileCard"></div>
  </div>

  <!-- ===== 运势查询 ===== -->
  <div class="panel" id="panelFortune">
    <div class="fortune-box">
      <div style="text-align:center;margin-bottom:20px">
        <p style="font-family:'Orbitron',sans-serif;font-size:.8rem;color:var(--cyan);letter-spacing:3px;margin-bottom:8px">✦ PERSONAL HOROSCOPE ✦</p>
        <p style="font-size:.88rem;color:rgba(200,216,240,.6);line-height:1.8">输入你的出生日期，星际命典将为你解析专属星座档案、<br>性格密码，以及近期与长期的命运走向。</p>
      </div>
      <div class="input-group">
        <input type="number" id="fYear" placeholder="出生年份" min="1940" max="2026" value="2000">
        <input type="number" id="fMonth" placeholder="月" min="1" max="12" value="6">
        <input type="number" id="fDay" placeholder="日" min="1" max="31" value="15">
        <button class="btn-main" onclick="queryFortune()">ANALYZE</button>
      </div>
      <div id="fortuneResult"></div>
    </div>
  </div>

  <!-- ===== 配对指数 ===== -->
  <div class="panel" id="panelMatch">
    <div class="match-box">
      <div style="text-align:center;margin-bottom:20px">

}
function querySxMatch(){
  const ai=+document.getElementById('sxA').value,bi=+document.getElementById('sxB').value;

  // 三合/六合/相冲
  const sanhe=[[0,4,8],[1,5,9],[2,6,10],[3,7,11]];
  const liuhe=[[0,1],[2,11],[3,10],[4,9],[5,8],[6,7]];
  const chong=[[0,6],[1,7],[2,8],[3,9],[4,10],[5,11]];
  let base=65;
  sanhe.forEach(g=>{if(g.includes(ai)&&g.includes(bi))base=92});
  liuhe.forEach(g=>{if(g.includes(ai)&&g.includes(bi))base=88});
  chong.forEach(g=>{if((g[0]===ai&&g[1]===bi)||(g[1]===ai&&g[0]===bi))base=35});

  el.innerHTML=`
  <div class="match-result">

  setTimeout(()=>{el.querySelectorAll('.meter-fill').forEach(f=>{f.style.width=f.dataset.w+'%'})},100);

// ========== 星空背景 ==========
const cv=document.getElementById('stars'),cx=cv.getContext('2d');
let starPts=[];
function initStars(){
  cv.width=innerWidth;cv.height=innerHeight;starPts=[];
  const n=Math.min(200,Math.floor(cv.width*cv.height/8000));
  for(let i=0;i<n;i++){
    starPts.push({x:Math.random()*cv.width,y:Math.random()*cv.height,r:Math.random()*1.4+.3,o:Math.random(),sp:Math.random()*.008+.002,ph:Math.random()*6.28,
    c:Math.random()>.8?'0,238,255':(Math.random()>.6?'168,85,247':'200,216,240')});
  }
}
function drawStars(){
  cx.clearRect(0,0,cv.width,cv.height);
  starPts.forEach(s=>{
    s.ph+=s.sp;
    const o=s.o*(.5+Math.sin(s.ph)*.5);
    cx.beginPath();cx.arc(s.x,s.y,s.r,0,6.28);
    cx.fillStyle=`rgba(${s.c},${o})`;cx.fill();
    if(s.r>1.2){cx.beginPath();cx.arc(s.x,s.y,s.r*2.5,0,6.28);cx.fillStyle=`rgba(${s.c},${o*.15})`;cx.fill()}
  });
  // 连线
  for(let i=0;i<starPts.length;i++){
    for(let j=i+1;j<starPts.length;j++){
      const dx=starPts[i].x-starPts[j].x,dy=starPts[i].y-starPts[j].y,d=Math.sqrt(dx*dx+dy*dy);
      if(d<80){cx.beginPath();cx.moveTo(starPts[i].x,starPts[i].y);cx.lineTo(starPts[j].x,starPts[j].y);cx.strokeStyle=`rgba(0,238,255,${.02*(1-d/80)})`;cx.lineWidth=.3;cx.stroke()}
    }
  }
  requestAnimationFrame(drawStars);
}
window.addEventListener('resize',initStars);
initStars();drawStars();
